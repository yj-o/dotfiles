theme = "gruvbox"

[editor]
scroll-lines = 1
cursorline = true
auto-save = false
completion-trigger-len = 1
true-color = true
color-modes = true
auto-pairs = true
rulers = [120]
bufferline = "multiple"
idle-timeout = 50

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "▏"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-type", "total-line-numbers", "file-encoding"]
center = []
right = ["selections", "primary-selection-length", "position", "position-percentage", "spacer", "diagnostics", "workspace-diagnostics", "version-control"]

[keys.normal]
# flip anchor and cursor
space.space = "flip_selections"

z.t = "scroll_down"
z.s = "scroll_up"
Z.t = "scroll_down"
Z.s = "scroll_up"

space.c = "toggle_comments"
space.w.c = "jump_view_left"
space.w.r = "jump_view_right"
space.w.t = "jump_view_down"
space.w.s = "jump_view_up"
space.w.o = "hsplit"

[keys.insert]
C-x = "delete_selection"
C-c = "yank_to_clipboard"
C-v = "paste_clipboard_after"
C-z = "undo"
C-r = "redo"
"C-," = "completion"